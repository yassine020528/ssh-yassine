# fly.toml app configuration file generated for ssh-yassine on 2026-05-14T04:18:05-04:00
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'ssh-yassine'
primary_region = 'yyz'

[build]

[[services]]
  internal_port = 2222
  protocol = "tcp"
  auto_stop_machines = false
  auto_start_machines = true

  [[services.ports]]
    port = 22
  [[services.ports]]
    port = 443
    
[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
  
[mounts]
  source = "ssh_keys"
  destination = "/app/keys"